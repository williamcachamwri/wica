name: Sync Blogs & Deploy

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency: deploy

permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sync blog posts
        run: node scripts/sync-blogs.mjs
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          ALIBABA_API_KEY: ${{ secrets.ALIBABA_API_KEY }}

      - name: Build
        run: npm run build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}

      - name: Commit new posts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync imported blog posts"
          file_pattern: src/posts/ scripts/imported-posts.json

      - name: Deploy to Cloudflare Pages
        run: node_modules/.bin/wrangler pages deploy dist/ --project-name=wica --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
